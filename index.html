<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px;
            padding-top: 16px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .header-subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        /* Budget Card */
        .budget-card {
            background: linear-gradient(135deg, var(--bg-light) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .budget-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .budget-amount {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .budget-bar {
            width: 100%;
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .budget-progress {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .budget-progress.warning {
            background: linear-gradient(90deg, var(--warning), var(--danger));
        }

        .budget-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-light);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            animation: slideDown 0.5s ease-out 0.1s backwards;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-value.positive {
            color: var(--success);
        }

        .stat-value.negative {
            color: var(--danger);
        }

        /* Sections */
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Categories */
        .categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .category-btn {
            background: var(--bg-light);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            color: var(--text);
            transition: all 0.2s;
            font-weight: 600;
        }

        .category-btn:active {
            transform: scale(0.95);
        }

        .category-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .category-emoji {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        /* Transactions List */
        .transactions {
            margin-bottom: 24px;
        }

        .transaction-item {
            background: var(--bg-light);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .transaction-left {
            flex: 1;
        }

        .transaction-category {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .transaction-details {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .transaction-amount {
            font-size: 16px;
            font-weight: 700;
            color: var(--danger);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            margin-left: 8px;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:active {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            width: 100%;
            max-width: 600px;
            background: var(--bg-light);
            border-radius: 20px 20px 0 0;
            padding: 24px 20px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid rgba(99, 102, 241, 0.3);
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* Bottom Action Buttons */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 40;
        }

        .fab:active {
            transform: scale(0.9);
        }

        .fab-add-money {
            bottom: 90px;
            background: linear-gradient(135deg, var(--success), #34d399);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        /* Setup Screen */
        .setup-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .setup-screen.active {
            display: flex;
        }

        .setup-content {
            max-width: 400px;
            text-align: center;
            color: white;
        }

        .setup-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .setup-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .setup-description {
            font-size: 16px;
            margin-bottom: 32px;
            opacity: 0.9;
        }

        .setup-input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 700;
            font-family: inherit;
        }

        .setup-input::placeholder {
            color: #cbd5e1;
        }

        .setup-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: white;
            color: var(--primary);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .setup-btn:active {
            transform: scale(0.98);
        }

        /* Category Colors */
        .category-food { --color: #f97316; }
        .category-entertainment { --color: #ec4899; }
        .category-shopping { --color: #8b5cf6; }
        .category-gaming { --color: #06b6d4; }
        .category-sports { --color: #10b981; }
        .category-other { --color: #6366f1; }

        .category-food { border-color: rgba(249, 115, 22, 0.3); }
        .category-food.active { background: #f97316; }

        .category-entertainment { border-color: rgba(236, 72, 153, 0.3); }
        .category-entertainment.active { background: #ec4899; }

        .category-shopping { border-color: rgba(139, 92, 246, 0.3); }
        .category-shopping.active { background: #8b5cf6; }

        .category-gaming { border-color: rgba(6, 182, 212, 0.3); }
        .category-gaming.active { background: #06b6d4; }

        .category-sports { border-color: rgba(16, 185, 129, 0.3); }
        .category-sports.active { background: #10b981; }

        .category-other { border-color: rgba(99, 102, 241, 0.3); }
        .category-other.active { background: #6366f1; }

        /* Responsive */
        @media (max-height: 600px) {
            .header {
                padding: 12px 20px;
            }

            .header-title {
                font-size: 24px;
            }

            .budget-amount {
                font-size: 28px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Setup Screen -->
        <div class="setup-screen active" id="setupScreen">
            <div class="setup-content">
                <div class="setup-emoji">💰</div>
                <h1 class="setup-title">Money Tracker</h1>
                <p class="setup-description">Track your spending and manage your budget</p>
                <input 
                    type="number" 
                    class="setup-input" 
                    id="budgetInput" 
                    placeholder="Monthly Budget ($)"
                    min="0"
                    step="0.01"
                >
                <button class="setup-btn" onclick="setBudget()">Get Started</button>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainApp" style="display: none; flex: 1; display: flex; flex-direction: column;">
            <!-- Header -->
            <div class="header">
                <div class="header-title">💰 Money Tracker</div>
                <div class="header-subtitle" id="headerSubtitle">Track your spending</div>
            </div>

            <!-- Content -->
            <div class="content">
                <!-- Budget Card -->
                <div class="budget-card">
                    <div class="budget-label">Remaining Budget</div>
                    <div class="budget-amount" id="budgetRemaining">$0.00</div>
                    <div class="budget-bar">
                        <div class="budget-progress" id="budgetProgress" style="width: 0%"></div>
                    </div>
                    <div class="budget-info">
                        <span id="budgetSpent">Spent: $0.00</span>
                        <span id="budgetTotal">Total: $0.00</span>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">This Month</div>
                        <div class="stat-value negative" id="totalSpent">$0.00</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Transactions</div>
                        <div class="stat-value" id="transactionCount">0</div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="section-title">
                    <span>📋 Recent Activity</span>
                    <button style="margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; text-decoration: underline; padding: 0;" onclick="clearAllTransactions()">Clear All</button>
                </div>

                <div class="transactions" id="transactionsList">
                    <div class="empty-state">
                        <div class="empty-emoji">📊</div>
                        <p>No transactions yet. Add your first expense!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Transaction Modal -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Add Expense</h2>
                    <button class="close-btn" onclick="closeModal()">×</button>
                </div>

                <!-- Category Selection -->
                <div>
                    <div class="section-title">Category</div>
                    <div class="categories" id="categoriesContainer"></div>
                </div>

                <!-- Form -->
                <form onsubmit="handleAddTransaction(event)">
                    <div class="form-group">
                        <label class="form-label">Amount</label>
                        <input 
                            type="number" 
                            class="form-input" 
                            id="amount" 
                            placeholder="0.00" 
                            step="0.01"
                            min="0"
                            required
                            inputmode="decimal"
                        >
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Date</label>
                            <input 
                                type="date" 
                                class="form-input" 
                                id="date" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label">Store/Place</label>
                            <input 
                                type="text" 
                                class="form-input" 
                                id="store" 
                                placeholder="e.g., Target"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">What did you buy?</label>
                        <input 
                            type="text" 
                            class="form-input" 
                            id="description" 
                            placeholder="e.g., New shoes"
                        >
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Add Expense</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- FAB Button -->
        <button class="fab" onclick="openModal()">+</button>
    </div>

    <script>
        // Constants
        const CATEGORIES = [
            { id: 'food', name: 'Food', emoji: '🍔' },
            { id: 'entertainment', name: 'Entertainment', emoji: '🎬' },
            { id: 'shopping', name: 'Shopping', emoji: '🛍️' },
            { id: 'gaming', name: 'Gaming', emoji: '🎮' },
            { id: 'sports', name: 'Sports', emoji: '⚽' },
            { id: 'other', name: 'Other', emoji: '📌' }
        ];

        // State
        let budget = 0;
        let transactions = [];
        let selectedCategory = 'food';

        // Init
        loadData();
        setupCategories();
        setDateToToday();

        // Functions
        function loadData() {
            try {
                const saved = localStorage.getItem('moneyTrackerData');
                if (saved) {
                    const data = JSON.parse(saved);
                    budget = data.budget;
                    transactions = data.transactions || [];
                    
                    if (budget > 0) {
                        showMainApp();
                    }
                }
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        function saveData() {
            try {
                localStorage.setItem('moneyTrackerData', JSON.stringify({
                    budget,
                    transactions
                }));
                render();
            } catch (e) {
                console.error('Error saving data:', e);
            }
        }

        function setBudget() {
            const input = document.getElementById('budgetInput');
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) {
                alert('Please enter a valid budget amount');
                return;
            }

            budget = amount;
            saveData();
            showMainApp();
        }

        function showMainApp() {
            document.getElementById('setupScreen').classList.remove('active');
            document.getElementById('mainApp').style.display = 'flex';
            render();
        }

        function setupCategories() {
            const container = document.getElementById('categoriesContainer');
            CATEGORIES.forEach(category => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `category-btn category-${category.id}`;
                btn.innerHTML = `<span class="category-emoji">${category.emoji}</span>${category.name}`;
                btn.onclick = () => selectCategory(category.id, btn);
                if (category.id === 'food') {
                    btn.classList.add('active');
                }
                container.appendChild(btn);
            });
        }

        function selectCategory(id, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCategory = id;
        }

        function setDateToToday() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('amount').focus();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('amount').value = '';
            document.getElementById('store').value = '';
            document.getElementById('description').value = '';
            setDateToToday();
            selectCategory('food', document.querySelector('.category-food'));
        }

        function handleAddTransaction(e) {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const store = document.getElementById('store').value;
            const description = document.getElementById('description').value;

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            transactions.push({
                id: Date.now(),
                amount,
                date,
                store,
                description,
                category: selectedCategory,
                timestamp: new Date().toISOString()
            });

            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            saveData();
            closeModal();
        }

        function deleteTransaction(id) {
            if (confirm('Delete this transaction?')) {
                transactions = transactions.filter(t => t.id !== id);
                saveData();
            }
        }

        function clearAllTransactions() {
            if (confirm('Clear all transactions? This cannot be undone.')) {
                transactions = [];
                saveData();
            }
        }

        function render() {
            // Calculate totals (only expenses, not income)
            const totalSpent = transactions
                .filter(t => !t.isIncome)
                .reduce((sum, t) => sum + t.amount, 0);
            const remaining = budget - totalSpent;
            const percentage = (totalSpent / budget) * 100;

            // Update header
            document.getElementById('headerSubtitle').textContent = `$${remaining.toFixed(2)} left`;

            // Update budget card
            document.getElementById('budgetRemaining').textContent = `$${Math.max(0, remaining).toFixed(2)}`;
            document.getElementById('budgetSpent').textContent = `Spent: $${totalSpent.toFixed(2)}`;
            document.getElementById('budgetTotal').textContent = `Total: $${budget.toFixed(2)}`;

            const progress = document.getElementById('budgetProgress');
            progress.style.width = Math.min(percentage, 100) + '%';
            if (percentage > 80) {
                progress.classList.add('warning');
            } else {
                progress.classList.remove('warning');
            }

            // Update stats
            document.getElementById('totalSpent').textContent = `$${totalSpent.toFixed(2)}`;
            document.getElementById('transactionCount').textContent = transactions.length;

            // Render transactions
            const list = document.getElementById('transactionsList');
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">📊</div>
                        <p>No transactions yet. Add your first expense!</p>
                    </div>
                `;
            } else {
                list.innerHTML = transactions.map(t => {
                    const dateObj = new Date(t.date);
                    const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    
                    if (t.isIncome) {
                        return `
                            <div class="transaction-item" style="opacity: 0.9;">
                                <div class="transaction-left">
                                    <div class="transaction-category">💵 ${t.store}</div>
                                    <div class="transaction-details">
                                        <span>${dateStr}</span>
                                        ${t.description ? `<span>•</span><span>${t.description}</span>` : ''}
                                    </div>
                                </div>
                                <div>
                                    <div class="transaction-amount" style="color: var(--success);">+$${Math.abs(t.amount).toFixed(2)}</div>
                                    <button class="delete-btn" onclick="deleteTransaction(${t.id})">🗑️</button>
                                </div>
                            </div>
                        `;
                    } else {
                        const category = CATEGORIES.find(c => c.id === t.category);
                        return `
                            <div class="transaction-item">
                                <div class="transaction-left">
                                    <div class="transaction-category">${category.emoji} ${category.name}</div>
                                    <div class="transaction-details">
                                        <span>${dateStr}</span>
                                        ${t.store ? `<span>•</span><span>${t.store}</span>` : ''}
                                        ${t.description ? `<span>•</span><span>${t.description}</span>` : ''}
                                    </div>
                                </div>
                                <div>
                                    <div class="transaction-amount">-$${t.amount.toFixed(2)}</div>
                                    <button class="delete-btn" onclick="deleteTransaction(${t.id})">🗑️</button>
                                </div>
                            </div>
                        `;
                    }
                }).join('');
            }
        }

        // Settings button (optional - to change budget)
        window.changeBudget = function() {
            const newBudget = prompt('Enter new monthly budget:', budget);
            if (newBudget && parseFloat(newBudget) > 0) {
                budget = parseFloat(newBudget);
                saveData();
            }
        };

        function openAddMoneyModal() {
            document.getElementById('addMoneyModal').classList.add('active');
            document.getElementById('addMoneyAmount').focus();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('addMoneyDate').value = today;
        }

        function closeAddMoneyModal() {
            document.getElementById('addMoneyModal').classList.remove('active');
            document.getElementById('addMoneyAmount').value = '';
            document.getElementById('moneySource').value = '';
            document.getElementById('addMoneyNotes').value = '';
        }

        function handleAddMoney(e) {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('addMoneyAmount').value);
            const source = document.getElementById('moneySource').value;
            const date = document.getElementById('addMoneyDate').value;
            const notes = document.getElementById('addMoneyNotes').value;

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            // Add to budget
            budget += amount;

            // Also add as a transaction entry for tracking
            transactions.push({
                id: Date.now(),
                amount: -amount, // Negative to show as income
                date,
                store: source,
                description: notes,
                category: 'income',
                timestamp: new Date().toISOString(),
                isIncome: true
            });

            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            saveData();
            closeAddMoneyModal();
        }
    </script>

    <!-- Add Money Modal -->
    <div class="modal" id="addMoneyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Money</h2>
                <button class="modal-close" id="closeAddMoneyBtn" onclick="closeAddMoneyModal()">×</button>
            </div>

            <form onsubmit="handleAddMoney(event)">
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input 
                        type="number" 
                        class="form-input" 
                        id="addMoneyAmount" 
                        placeholder="0.00" 
                        step="0.01"
                        min="0"
                        required
                        inputmode="decimal"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Source</label>
                    <select class="form-select" id="moneySource" required>
                        <option value="">Select source...</option>
                        <option value="Chores">Chores</option>
                        <option value="Allowance">Allowance</option>
                        <option value="Birthday Gift">Birthday Gift</option>
                        <option value="Holiday Gift">Holiday Gift</option>
                        <option value="Refund">Refund</option>
                        <option value="Part-time Job">Part-time Job</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input 
                        type="date" 
                        class="form-input" 
                        id="addMoneyDate" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Notes (optional)</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="addMoneyNotes" 
                        placeholder="e.g., Mowed the lawn"
                    >
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Add Money</button>
                    <button type="button" class="btn btn-secondary" onclick="closeAddMoneyModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
